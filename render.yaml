services:
  # Backend Service
  - type: web
    name: school-rag-backend
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: school-rag-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: VECTOR_STORE_BACKEND
        value: chroma
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_ENVIRONMENT
        sync: false

  # Frontend Service
  - type: web
    name: school-rag-frontend
    env: docker
    dockerContext: frontend
    dockerfilePath: Dockerfile
    envVars:
      - key: VITE_API_BASE_URL
        value: https://school-rag-backend.onrender.com
    # Redirect all requests to index.html for SPAs (handled by Nginx in Docker)
    # routes:
    #   - type: rewrite
    #     source: /*
    #     destination: /index.html

databases:
  - name: school-rag-db
    databaseName: school_rag
    user: admin
    plan: free
