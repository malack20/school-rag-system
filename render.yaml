services:
  # Backend Service
  - type: web
    name: school-rag-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      # User needs to add secrets in Render dashboard
      - key: SECRET_KEY
        fromValue: placeholder
      - key: DATABASE_URL
        fromValue: placeholder
      - key: OPENAI_API_KEY
        fromValue: placeholder

  # Frontend Service
  - type: web
    name: school-rag-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://school-rag-backend.onrender.com
    # Redirect all requests to index.html for SPAs
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
