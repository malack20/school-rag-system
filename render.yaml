services:
  # Backend Service
  - type: web
    name: school-rag-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    dockerBuildArgs:
      BUILD_TARGET: backend-final
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: school-rag-backend.onrender.com,school-rag-system.onrender.com,localhost,127.0.0.1
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: https://school-rag-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: school-rag-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: VECTOR_STORE_BACKEND
        value: chroma
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_ENVIRONMENT
        sync: false

  # Frontend Service
  - type: web
    name: school-rag-frontend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    dockerBuildArgs:
      BUILD_TARGET: frontend-final
      VITE_API_BASE_URL: https://school-rag-backend.onrender.com
    envVars:
      - key: VITE_API_BASE_URL
        value: https://school-rag-backend.onrender.com

databases:
  - name: school-rag-db
    databaseName: school_rag
    user: admin
    plan: free
